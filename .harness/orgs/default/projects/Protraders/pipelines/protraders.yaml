pipeline:
  name: protraders
  identifier: protraders
  projectIdentifier: Protraders
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: protraders
        repoName: ProTraders
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: install
                  identifier: install
                  spec:
                    shell: Sh
                    command: mvn clean install
        delegateSelectors:
          - docker-delegate
